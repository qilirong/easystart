name: Build OpenWrt Plugin

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-x86:
    name: Build for x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

    - name: Clone OpenWrt source
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout openwrt-23.05

    - name: Add plugin to OpenWrt
      run: |
        cd openwrt
        mkdir -p package/luci-app-easystart
        cp -r ../luci-app-easystart/* package/luci-app-easystart/

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure build for x86_64
      run: |
        cd openwrt
        make menuconfig
        echo "CONFIG_TARGET_x86=y" >> .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-easystart=y" >> .config
        make defconfig

    - name: Build plugin for x86_64
      run: |
        cd openwrt
        make package/luci-app-easystart/compile V=s

    - name: Upload x86_64 artifacts
      uses: actions/upload-artifact@v3
      with:
        name: luci-app-easystart-x86_64
        path: openwrt/bin/packages/*/luci-app-easystart*.ipk

  build-cudy-tr3000:
    name: Build for Cudy TR3000
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

    - name: Clone Cudy OpenWrt source
      run: |
        git clone https://github.com/cudytech/openwrt.git
        cd openwrt
        git checkout tr3000

    - name: Add plugin to OpenWrt
      run: |
        cd openwrt
        mkdir -p package/luci-app-easystart
        cp -r ../luci-app-easystart/* package/luci-app-easystart/

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure build for Cudy TR3000
      run: |
        cd openwrt
        make menuconfig
        echo "CONFIG_TARGET_mediatek=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_tr3000=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-easystart=y" >> .config
        make defconfig

    - name: Build plugin for Cudy TR3000
      run: |
        cd openwrt
        make package/luci-app-easystart/compile V=s

    - name: Upload Cudy TR3000 artifacts
      uses: actions/upload-artifact@v3
      with:
        name: luci-app-easystart-cudy-tr3000
        path: openwrt/bin/packages/*/luci-app-easystart*.ipk

  release:
    name: Create Release
    needs: [build-x86, build-cudy-tr3000]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          自动构建发布
          - x86_64 架构
          - Cudy TR3000 架构
        files: |
          artifacts/luci-app-easystart-x86_64/*.ipk
          artifacts/luci-app-easystart-cudy-tr3000/*.ipk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
