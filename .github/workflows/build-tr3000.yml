name: Build OpenWrt Plugin (Cudy TR3000)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build for Cudy TR3000
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3
        sudo apt-get install -y flex bison texinfo

    - name: Cache build artifacts
      uses: actions/cache@v3
      with:
        path: |
          openwrt/build_dir
          openwrt/dl
        key: openwrt-build-tr3000-${{ hashFiles('luci-app-easystart/**') }}
        restore-keys: |
          openwrt-build-tr3000-

    - name: Create OpenWrt directory if it doesn't exist
      run: |
        mkdir -p openwrt

    - name: Download and extract prebuilt SDK for ARM (Cudy TR3000)
      run: |
        cd openwrt
        # 检查SDK是否已经存在
        if [ -f "Makefile" ]; then
          echo "SDK already exists, skipping download and extraction..."
        else
          # 从清华源下载预编译SDK (ARM架构)
          echo "Downloading prebuilt SDK for ARM..."
          wget -O sdk.tar.xz https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/23.05.0/targets/mediatek/mt7622/openwrt-sdk-23.05.0-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          
          # 检查下载是否成功
          if [ ! -f sdk.tar.xz ]; then
            echo "Error: Failed to download SDK"
            exit 1
          fi
          
          # 解压SDK
          echo "Extracting SDK..."
          tar -xJf sdk.tar.xz
          
          # 检查解压是否成功
          if [ ! -d "openwrt-sdk-23.05.0-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64" ]; then
            echo "Error: Failed to extract SDK"
            exit 1
          fi
          
          # 移动SDK内容到当前目录
          echo "Moving SDK files to current directory..."
          mv openwrt-sdk-23.05.0-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64/* .
          mv openwrt-sdk-23.05.0-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64/.* . 2>/dev/null || true
          
          # 清理临时目录
          rm -rf openwrt-sdk-23.05.0-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64
          rm -f sdk.tar.xz
          
          # 检查SDK是否正确设置
          if [ ! -f "Makefile" ]; then
            echo "Error: Failed to set up SDK files"
            exit 1
          fi
          
          # 查看当前目录结构
          echo "SDK setup completed. Directory structure:"
          ls -la
        fi

    - name: Add plugin to OpenWrt
      run: |
        cd openwrt
        mkdir -p package/luci-app-easystart
        cp -r ../luci-app-easystart/* package/luci-app-easystart/

    - name: Update feeds and configure build for Cudy TR3000
      run: |
        cd openwrt
        # 使用清华源更新feeds
        echo "Configuring feeds with 清华源..."
        cat > feeds.conf.default << 'EOF'
src-git base https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/openwrt.git;openwrt-23.05
src-git packages https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/packages.git
src-git luci https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/luci.git
src-git routing https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/routing.git
src-git telephony https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/telephony.git
EOF
        echo "Updating feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 配置构建 (Cudy TR3000 使用 mediatek mt7622 架构)
        echo "Configuring build for Cudy TR3000..."
        echo "CONFIG_TARGET_mediatek=y" > .config
        echo "CONFIG_TARGET_mediatek_mt7622=y" >> .config
        echo "CONFIG_TARGET_mediatek_mt7622_DEVICE_cudy_tr3000=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-easystart=y" >> .config
        echo "CONFIG_CCACHE=n" >> .config
        make defconfig

    - name: Build plugin using prebuilt SDK
      run: |
        cd openwrt
        # 使用单线程编译，避免内存溢出
        echo "Building plugin for Cudy TR3000..."
        # 查看当前目录结构
        echo "Current directory structure:"
        ls -la
        # 查看package目录结构
        echo "Package directory structure:"
        ls -la package/
        # 查看luci-app-easystart目录内容
        echo "luci-app-easystart directory contents:"
        ls -la package/luci-app-easystart/
        # 查看Makefile内容
        echo "Makefile content:"
        cat package/luci-app-easystart/Makefile
        # 只编译插件及其依赖，不编译toolchain
        echo "Starting compilation..."
        make package/luci-app-easystart/compile -j1 V=s || {
          echo "插件编译失败，查看详细日志..."
          # 查看构建日志
          find . -name "*.log" -type f | xargs tail -n 100 2>/dev/null || echo "No log files found"
          # 查看bin目录结构
          echo "Bin directory structure:"
          ls -la bin/ 2>/dev/null || echo "Bin directory not found"
          # 查看packages目录结构
          echo "Packages directory structure:"
          ls -la bin/packages/ 2>/dev/null || echo "Packages directory not found"
          # 查看构建目录结构
          echo "Build directory structure:"
          ls -la build_dir/ 2>/dev/null || echo "Build directory not found"
          exit 1
        }
        echo "插件编译成功！"
        # 查看编译产物
        echo "Compiled packages:"
        find bin/packages -name "luci-app-easystart*.ipk" 2>/dev/null || echo "No packages found"

    - name: Create bin/packages directory if it doesn't exist
      run: |
        cd openwrt
        mkdir -p bin/packages

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-easystart-tr3000
        path: openwrt/bin/packages/*/luci-app-easystart*.ipk

    - name: List built packages
      run: |
        cd openwrt
        find bin/packages -name "luci-app-easystart*.ipk" || echo "No packages found"

    - name: Create release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_id }}-tr3000
        name: Release ${{ github.run_id }} (Cudy TR3000)
        body: |
          自动构建发布
          - 构建时间: ${{ github.run_started_at }}
          - Cudy TR3000 架构
        files: |
          openwrt/bin/packages/**/luci-app-easystart*.ipk
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
