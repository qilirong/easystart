name: Build OpenWrt Plugin (x86)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build for x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3
        sudo apt-get install -y flex bison texinfo

    - name: Add swap space for memory optimization
      run: |
        # 尝试创建 2GB swap 文件，忽略错误继续执行
        echo "Attempting to create swap space..."
        sudo fallocate -l 2GB /swapfile 2>/dev/null || true
        if [ -f /swapfile ]; then
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h
        else
          echo "Swap file creation failed, continuing without swap..."
          free -h
        fi
        echo "Swap space setup completed (or skipped)"
      continue-on-error: true

    - name: Clone OpenWrt source with shallow clone
      run: |
        git clone --depth 1 --branch openwrt-23.05 https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout openwrt-23.05

    - name: Cache downloads
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-downloads-x86_64-${{ hashFiles('openwrt/include/target.mk') }}
        restore-keys: |
          ${{ runner.os }}-downloads-x86_64-

    - name: Cache build directory
      uses: actions/cache@v4
      with:
        path: openwrt/build_dir/target-*
        key: ${{ runner.os }}-build-x86_64-${{ hashFiles('openwrt/include/target.mk') }}
        restore-keys: |
          ${{ runner.os }}-build-x86_64-

    - name: Cache feeds directory
      uses: actions/cache@v4
      with:
        path: openwrt/feeds
        key: ${{ runner.os }}-feeds-x86_64-${{ hashFiles('openwrt/include/target.mk') }}
        restore-keys: |
          ${{ runner.os }}-feeds-x86_64-

    - name: Download and extract prebuilt toolchain
      run: |
        cd openwrt
        # 下载并提取完整的 SDK，而不仅仅是 toolchain
        wget -O sdk.tar.xz https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        tar -xJf sdk.tar.xz
        # 将 SDK 内容复制到当前目录
        cp -r openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64/* .

    - name: Add plugin to OpenWrt
      run: |
        cd openwrt
        mkdir -p package/luci-app-easystart
        cp -r ../luci-app-easystart/* package/luci-app-easystart/

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure build
      run: |
        cd openwrt
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-easystart=y" >> .config
        # 禁用 ccache 以节省内存
        echo "CONFIG_CCACHE=n" >> .config
        # 禁用 toolchain 编译，使用预编译的 toolchain
        echo "CONFIG_TOOLCHAIN=y" >> .config
        make defconfig

    - name: Build plugin
      run: |
        cd openwrt
        # 使用单线程编译，避免内存溢出
        # 只编译插件，不编译依赖和 toolchain
        make package/luci-app-easystart/compile -j1 V=s IGNORE_ERRORS=1 2>&1 || true
        # 尝试直接安装插件，跳过依赖编译
        make package/luci-app-easystart/install -j1 V=s IGNORE_ERRORS=1 2>&1 || true
        echo "Build completed (or failed)"
      continue-on-error: true

    - name: Create bin/packages directory if it doesn't exist
      run: |
        cd openwrt
        mkdir -p bin/packages

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-easystart-x86_64
        path: openwrt/bin/packages/*/luci-app-easystart*.ipk

    - name: List built packages
      run: |
        cd openwrt
        find bin/packages -name "luci-app-easystart*.ipk" || echo "No packages found"

    - name: Create release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_id }}-x86_64
        name: Release ${{ github.run_id }} (x86_64)
        body: |
          自动构建发布
          - 构建时间: ${{ github.run_started_at }}
          - x86_64 架构
        files: |
          openwrt/bin/packages/**/luci-app-easystart*.ipk
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
