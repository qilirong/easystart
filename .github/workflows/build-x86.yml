name: Build OpenWrt Plugin (x86)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build for x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3
        sudo apt-get install -y flex bison texinfo

    - name: Add swap space for memory optimization
      run: |
        # 尝试创建 2GB swap 文件，忽略错误继续执行
        echo "Attempting to create swap space..."
        sudo fallocate -l 2GB /swapfile 2>/dev/null || true
        if [ -f /swapfile ]; then
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h
        else
          echo "Swap file creation failed, continuing without swap..."
          free -h
        fi
        echo "Swap space setup completed (or skipped)"
      continue-on-error: true

    - name: Clean up previous OpenWrt directory
      run: |
        rm -rf openwrt
        mkdir -p openwrt



    - name: Download and extract prebuilt SDK from OpenWrt官网
      run: |
        cd openwrt
        # 下载OpenWrt官网的预编译SDK
        echo "Downloading prebuilt SDK from OpenWrt官网..."
        wget -O sdk.tar.xz https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        
        # 检查下载是否成功
        if [ ! -f sdk.tar.xz ]; then
          echo "Error: Failed to download SDK from OpenWrt官网"
          exit 1
        fi
        
        # 解压SDK
        echo "Extracting SDK..."
        tar -xJf sdk.tar.xz
        
        # 检查解压是否成功
        if [ ! -d "openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64" ]; then
          echo "Error: Failed to extract SDK"
          exit 1
        fi
        
        # 移动SDK内容到当前目录
        echo "Moving SDK files to current directory..."
        mv openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64/* .
        mv openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64/.* . 2>/dev/null || true
        
        # 清理临时目录
        rm -rf openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64
        
        # 检查SDK是否正确设置
        if [ ! -f "Makefile" ]; then
          echo "Error: Failed to set up SDK files"
          exit 1
        fi
        
        # 查看当前目录结构
        echo "SDK setup completed. Directory structure:"
        ls -la

    - name: Add plugin to OpenWrt
      run: |
        cd openwrt
        mkdir -p package/luci-app-easystart
        cp -r ../luci-app-easystart/* package/luci-app-easystart/

    - name: Update feeds and configure build
      run: |
        cd openwrt
        # 更新feeds
        echo "Updating feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 配置构建
        echo "Configuring build..."
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-easystart=y" >> .config
        echo "CONFIG_CCACHE=n" >> .config
        make defconfig

    - name: Build plugin using prebuilt SDK
      run: |
        cd openwrt
        # 使用单线程编译，避免内存溢出
        echo "Building plugin using prebuilt SDK..."
        # 只编译插件及其依赖，不编译toolchain
        make package/luci-app-easystart/compile -j1 V=s
        
        # 检查编译是否成功
        if [ $? -eq 0 ]; then
          echo "插件编译成功！"
        else
          echo "插件编译失败，查看详细日志..."
          # 查看构建日志
          find . -name "*.log" -type f | xargs tail -n 100
          exit 1
        fi

    - name: Create bin/packages directory if it doesn't exist
      run: |
        cd openwrt
        mkdir -p bin/packages

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-easystart-x86_64
        path: openwrt/bin/packages/*/luci-app-easystart*.ipk

    - name: List built packages
      run: |
        cd openwrt
        find bin/packages -name "luci-app-easystart*.ipk" || echo "No packages found"

    - name: Create release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_id }}-x86_64
        name: Release ${{ github.run_id }} (x86_64)
        body: |
          自动构建发布
          - 构建时间: ${{ github.run_started_at }}
          - x86_64 架构
        files: |
          openwrt/bin/packages/**/luci-app-easystart*.ipk
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
