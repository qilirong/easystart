name: Build OpenWrt Plugin (x86)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build for x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3
        sudo apt-get install -y flex bison texinfo

    - name: Clone OpenWrt source with shallow clone
      run: |
        git clone --depth 1 --branch openwrt-23.05 https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout openwrt-23.05

    - name: Cache downloads
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-downloads-x86_64-${{ hashFiles('openwrt/include/target.mk') }}
        restore-keys: |
          ${{ runner.os }}-downloads-x86_64-

    - name: Cache build directory
      uses: actions/cache@v4
      with:
        path: openwrt/build_dir/target-*
        key: ${{ runner.os }}-build-x86_64-${{ hashFiles('openwrt/include/target.mk') }}
        restore-keys: |
          ${{ runner.os }}-build-x86_64-

    - name: Cache feeds directory
      uses: actions/cache@v4
      with:
        path: openwrt/feeds
        key: ${{ runner.os }}-feeds-x86_64-${{ hashFiles('openwrt/include/target.mk') }}
        restore-keys: |
          ${{ runner.os }}-feeds-x86_64-

    - name: Download prebuilt toolchain
      run: |
        cd openwrt
        # 下载适合 x86_64 的预编译 toolchain
        wget -O toolchain.tar.xz https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        # 检查下载是否成功
        if [ ! -f toolchain.tar.xz ]; then
          echo "Error: Failed to download toolchain"
          exit 1
        fi
        # 解压 toolchain
        tar -xJf toolchain.tar.xz
        # 检查解压是否成功
        if [ ! -d "openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64" ]; then
          echo "Error: Failed to extract toolchain"
          exit 1
        fi
        # 创建 staging_dir 目录（如果不存在）
        mkdir -p staging_dir
        # 将 toolchain 复制到指定位置
        cp -r openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64/staging_dir/toolchain-* staging_dir/
        # 检查复制是否成功
        if [ ! -d "staging_dir/toolchain-*" ]; then
          echo "Error: Failed to copy toolchain"
          exit 1
        fi
        # 查看复制后的目录结构
        ls -la staging_dir/

    - name: Add plugin to OpenWrt
      run: |
        cd openwrt
        mkdir -p package/luci-app-easystart
        cp -r ../luci-app-easystart/* package/luci-app-easystart/

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure build
      run: |
        cd openwrt
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-easystart=y" >> .config
        make defconfig

    - name: Build plugin
      run: |
        cd openwrt
        # 查看当前目录结构
        ls -la
        # 查看 package 目录中的插件
        ls -la package/luci-app-easystart/
        # 构建插件，增加详细输出
        make package/luci-app-easystart/compile -j1 V=s || {
          echo "Build failed, showing more details..."
          # 查看构建日志
          find . -name "*.log" -type f | xargs tail -n 50
          exit 1
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-easystart-x86_64
        path: openwrt/bin/packages/*/luci-app-easystart*.ipk

    - name: List built packages
      run: |
        cd openwrt
        find bin/packages -name "luci-app-easystart*.ipk"

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_id }}-x86_64
        name: Release ${{ github.run_id }} (x86_64)
        body: |
          自动构建发布
          - 构建时间: ${{ github.run_started_at }}
          - x86_64 架构
        files: |
          openwrt/bin/packages/**/luci-app-easystart*.ipk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
