<div class="easystart-section">
    <h3>桥接模式配置</h3>
    <div class="cbi-value">
        <label>说明:</label>
        <div style="margin-left: 150px; color: #666;">
            桥接模式下，路由器将作为透明网桥工作，不进行网络地址转换。
            此时路由器的LAN口和WAN口将处于同一网段，由上游设备分配IP地址。
        </div>
    </div>
    <div class="cbi-value">
        <label>注意:</label>
        <div style="margin-left: 150px; color: #ff6600;">
            桥接模式下，路由器本身将失去管理IP地址，请确保通过其他方式访问路由器管理界面。
        </div>
    </div>
</div>
